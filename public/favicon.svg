<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="growthGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e676"></stop>
      <stop offset="100%" stop-color="#00c853"></stop>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="#0f0f0f"></rect>

  <!-- R Letter -->
  <text x="14" y="42" font-family="Poppins, Arial, sans-serif" font-size="28" font-weight="700" fill="white">
    R
  </text>

  <!-- B Letter -->
  <text x="32" y="42" font-family="Poppins, Arial, sans-serif" font-size="28" font-weight="700" fill="white">
    B
  </text>

  <!-- Upward Arrow -->
  <path d="M20 30 L32 18 L44 30" fill="none" stroke="url(#growthGrad)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"></path>

  <line x1="32" y1="18" x2="32" y2="36" stroke="url(#growthGrad)" stroke-width="4" stroke-linecap="round"></line>
</svg>